
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Joaçaba Padel 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#c8f000;--accent-dim:rgba(200,240,0,0.12);--text:#f0f2f5;--muted:#6b7280;--fem:#ff6b9d;--next:#f0c040;--hist:#60b8f0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Outfit",sans-serif;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(200,240,0,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
  .container{max-width:960px;margin:0 auto;padding:0 1.2rem;position:relative;z-index:1}
  header{padding:1.8rem 0 1.5rem;text-align:center;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
  .header-logos{display:flex;align-items:center;justify-content:center;gap:2rem;margin-bottom:0.6rem;flex-wrap:wrap}
  .logo-escudo{height:100px;width:auto}
  .logo-clube{height:52px;width:auto}
  .header-title{font-family:"Bebas Neue",cursive;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.12em;color:var(--accent);line-height:1;margin-bottom:.2rem}
  .header-sub{color:var(--muted);font-size:.78rem;letter-spacing:.05em}
  .sync-info{display:inline-flex;align-items:center;gap:.5rem;margin-top:.8rem;font-size:.75rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:.3rem 1rem}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
  .sync-dot.live{background:var(--accent);animation:pulse 2s infinite}
  .sync-dot.error{background:#ff4444}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .rodada-banner{background:linear-gradient(135deg,rgba(200,240,0,0.07),rgba(200,240,0,0.03));border:1px solid rgba(200,240,0,0.22);border-radius:12px;padding:.85rem 1.1rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
  .rodada-icon{font-size:1.3rem}
  .rodada-text strong{color:var(--accent);font-size:1.15rem;display:block;font-weight:800;letter-spacing:.02em}
  .rodada-text span{color:var(--muted);font-size:.76rem}
  .nav-buttons{display:flex;gap:.6rem;margin-bottom:1.3rem;flex-wrap:wrap}
  .nav-btn{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem .8rem;font-family:"Outfit",sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
  .nav-btn:hover{color:var(--text);border-color:#3a3a3a}
  .nav-btn.active-ranking{background:var(--accent-dim);border-color:rgba(200,240,0,0.6);color:var(--accent);font-size:.9rem;font-weight:700;box-shadow:0 0 12px rgba(200,240,0,0.15)}
  .nav-btn.active-proxima{background:rgba(240,192,64,0.08);border-color:rgba(240,192,64,0.35);color:var(--next)}
  .nav-btn.active-hist{background:rgba(96,184,240,0.10);border-color:rgba(96,184,240,0.4);color:var(--hist)}
  .nav-btn.hist-btn{}
  .tabs{display:flex;margin-bottom:1.2rem;border-bottom:1px solid var(--border)}
  .tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:"Outfit",sans-serif;font-size:.82rem;font-weight:600;padding:.5rem 1.1rem .6rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.06em}
  .tab.active.masc{color:var(--accent);border-bottom-color:var(--accent)}
  .tab.active.fem{color:var(--fem);border-bottom-color:var(--fem)}
  .tab.active.next{color:var(--next);border-bottom-color:var(--next)}
  .tab.active.hist{color:var(--hist);border-bottom-color:var(--hist)}
  .tab:hover:not(.active){color:var(--text)}
  .search-row{position:relative;margin-bottom:1.1rem}
  .search-row input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem .6rem 2.3rem;color:var(--text);font-family:"Outfit",sans-serif;font-size:.86rem;outline:none;transition:border-color .2s}
  .search-row input:focus{border-color:rgba(200,240,0,0.35)}
  .search-row input::placeholder{color:var(--muted)}
  .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .confronto-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:.75rem;overflow:hidden}
  .confronto-block:hover{border-color:#333}
  .confronto-block.wo-atual{border-color:rgba(255,68,68,0.5)!important;background:rgba(255,68,68,0.03)}
  .confronto-block.next-block{border-color:rgba(240,192,64,0.2)}
  .confronto-block.hist-block{border-color:rgba(96,184,240,0.2)}
  .confronto-block.wo-block{border-color:rgba(255,68,68,0.5)!important}
  .wo-badge{background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.5);color:#ff4444;font-size:.68rem;font-weight:800;letter-spacing:.1em;padding:.2rem .6rem;border-radius:4px;flex-shrink:0}
  .hist-agenda-info{font-size:.78rem;color:#888;margin-left:auto;padding-right:.5rem;white-space:nowrap}
  .confronto-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);gap:.5rem}
  .confronto-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
  .confronto-title.masc{color:rgba(200,240,0,0.75)}
  .confronto-title.fem{color:rgba(255,107,157,0.8)}
  .confronto-title.next-masc{color:rgba(240,192,64,0.85)}
  .confronto-title.next-fem{color:rgba(240,192,64,0.65)}
  .confronto-title.hist-masc{color:rgba(96,184,240,0.85)}
  .confronto-title.hist-fem{color:rgba(96,184,240,0.65)}
  .col-headers{display:grid;grid-template-columns:28px 1fr 68px 68px;gap:.5rem;padding:.28rem 1rem;background:#131313;border-bottom:1px solid var(--border)}
  .col-h{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#333}
  .col-h.right{text-align:right}
  .player-row{display:grid;grid-template-columns:28px 1fr 68px 68px;align-items:center;gap:.5rem;padding:.55rem 1rem;border-top:1px solid var(--border);transition:background .12s}
  .player-row:hover{background:rgba(255,255,255,0.015)}
  .slot-num{width:24px;height:24px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#444}
  .slot-num.next-slot{border-color:rgba(240,192,64,0.3);color:rgba(240,192,64,0.7)}
  .slot-num.hist-slot{border-color:rgba(96,184,240,0.3);color:rgba(96,184,240,0.7)}
  .slot-num.slot-1st{background:#1a4a1a;border-color:#4caf50;color:#4caf50;font-weight:800}
  .slot-num.slot-2nd{background:#4a3d00;border-color:#ffc107;color:#ffc107;font-weight:800}
  .slot-num.slot-4th{background:#4a1010;border-color:#f44336;color:#f44336;font-weight:800}
  .agenda-status{display:flex;align-items:center;gap:6px;font-size:.92rem;font-weight:700;letter-spacing:.04em;flex-shrink:0}
  .agenda-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .agenda-dot.cinza{background:#555;border:1px solid #666}
  .agenda-dot.amarelo{background:#ffc107;border:1px solid #ffdb6d;box-shadow:0 0 4px rgba(255,193,7,0.5)}
  .agenda-dot.verde{background:#4caf50;border:1px solid #81c784;box-shadow:0 0 4px rgba(76,175,80,0.5)}
  .agenda-label.cinza{color:#666}
  .agenda-label.amarelo{color:#ffc107}
  .agenda-label.verde{color:#4caf50}
  .agenda-info{font-size:.92rem;color:#ffffff;font-weight:600;margin-left:auto;padding-right:.5rem;white-space:nowrap}
  .player-name{font-size:.86rem;font-weight:500;display:flex;align-items:center;gap:.25rem}
  .player-name.empty{color:var(--muted);font-style:italic;font-weight:300;font-size:.78rem}
  .player-name.pending{color:#3a3a2a;font-style:italic;font-weight:300;font-size:.78rem}
  .jogo-cell{text-align:right;font-family:"Bebas Neue",cursive;font-size:1.05rem;letter-spacing:.04em;color:#2a2a2a}
  .jogo-cell.has-value{color:var(--next)}
  .jogo-cell.hist-value{color:var(--hist)}
  .soma-cell{text-align:right;font-family:"Bebas Neue",cursive;font-size:1.1rem;letter-spacing:.04em;color:var(--accent)}
  .soma-cell.fem{color:var(--fem)}
  .soma-cell.next-val{color:rgba(240,192,64,0.9)}
  .soma-cell.empty{color:#2a2a2a}
  .player-row.hl{background:rgba(200,240,0,0.04)}
  .player-row.hl .player-name{color:var(--accent)}
  .player-row.hl.fem-hl{background:rgba(255,107,157,0.06)}
  .player-row.hl.fem-hl .player-name{color:var(--fem)}
  .proxima-banner{background:rgba(240,192,64,0.06);border:1px solid rgba(240,192,64,0.25);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1.2rem;text-align:center}
  .proxima-banner strong{color:var(--next);font-size:.88rem;display:block;margin-bottom:.2rem}
  .proxima-banner p{color:var(--muted);font-size:.74rem}
  .hist-banner{background:rgba(96,184,240,0.06);border:1px solid rgba(96,184,240,0.25);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1.2rem;text-align:center}
  .hist-banner strong{color:var(--hist);font-size:.88rem;display:block;margin-bottom:.2rem}
  .hist-banner p{color:var(--muted);font-size:.74rem}
  .loading{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  footer{text-align:center;padding:1.8rem 0 2.5rem;color:#2e2e2e;font-size:.68rem;border-top:1px solid var(--border);margin-top:1.5rem}
  @media(max-width:480px){
    .player-row,.col-headers{grid-template-columns:24px 1fr 56px 56px;padding:.45rem .75rem}
    .confronto-header{padding:.45rem .75rem}
    .player-name{font-size:.78rem}
    .logo-escudo{height:78px}
    .logo-clube{height:40px}
    .nav-btn{font-size:.72rem;padding:.55rem .5rem}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-logos">
      <img class="logo-escudo" src="rank26.png" alt="Ranking Joacaba Padel 2026">
      <img class="logo-clube"  src="logopj.png" alt="Padel Joacaba">
    </div>
    <div class="header-title">Ranking Joaçaba Padel</div>
    <div class="header-sub">Temporada 2026</div>
    <div class="sync-info">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncStatus">Carregando...</span>
    </div>
  </header>

  <div class="rodada-banner">
    <div class="rodada-icon">🗓️</div>
    <div class="rodada-text">
      <strong id="rodadaTitle">Carregando...</strong>
    </div>
  </div>

  <!-- BARRA DE NAVEGAÇÃO -->
  <div class="nav-buttons" id="navButtons">
    <!-- Botões históricos gerados dinamicamente (inseridos ANTES dos fixos) -->
    <button class="nav-btn active-ranking" id="btn-ranking" onclick="switchView('ranking')">🏆 Classificação · ATUAL</button>
    <button class="nav-btn" id="btn-proxima" onclick="switchView('proxima')">Formação da Próxima Rodada</button>
  </div>

  <!-- RANKING ATUAL -->
  <div id="view-ranking">
    <div class="tabs">
      <button class="tab active masc" id="tab-masc" onclick="switchTab('masc')">🧑 Masculino</button>
      <button class="tab fem" id="tab-fem" onclick="switchTab('fem')">👩 Feminino</button>
    </div>
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar jogador..." oninput="filterSearch()">
    </div>
    <div id="loading-ranking" class="loading"><div class="spinner"></div><p>Carregando...</p></div>
    <div id="panel-masc" class="hidden"></div>
    <div id="panel-fem" class="hidden"></div>
  </div>

  <!-- PROXIMA RODADA -->
  <div id="view-proxima" class="hidden">
    <div class="proxima-banner">
      <strong id="proximaBannerTitle">⚡ Formação da Próxima Rodada</strong>
      <p>Confrontos definidos · Atualiza automaticamente conforme a planilha</p>
    </div>
    <div class="tabs">
      <button class="tab active next" id="tab-next-masc" onclick="switchNextTab('masc')">🧑 Masculino</button>
      <button class="tab next"        id="tab-next-fem"  onclick="switchNextTab('fem')">👩 Feminino</button>
    </div>
    <div id="panel-next-masc"></div>
    <div id="panel-next-fem" class="hidden"></div>
  </div>

  <!-- HISTÓRICO (gerado dinamicamente) -->
  <div id="view-hist" class="hidden">
    <div class="hist-banner">
      <strong id="histBannerTitle">📋 Histórico</strong>
      <p>Resultado completo desta rodada</p>
    </div>
    <div class="tabs">
      <button class="tab active hist" id="tab-hist-masc" onclick="switchHistTab('masc')">🧑 Masculino</button>
      <button class="tab hist"        id="tab-hist-fem"  onclick="switchHistTab('fem')">👩 Feminino</button>
    </div>
    <div id="panel-hist-masc"></div>
    <div id="panel-hist-fem" class="hidden"></div>
  </div>

  <footer>Ranking Joaçaba Padel 2026 &nbsp;·&nbsp; Desenvolvido com ❤️ para o esporte</footer>
</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbzEJ2SPXBL8nrKxYMRdT6pcHKSc05Np-C6z6NNyhhibMpJB8Cdw2fDkeyb0T9QoBNg1/exec";
var DATA = {masc:[], fem:[], next_masc:[], next_fem:[]};
var HISTORICO = {};   // { "2026 Jogo 4": { masc: [...], fem: [...] } }
var AGENDA = {};
var cView = "ranking", cTab = "masc", cNTab = "masc", cHTab = "masc";
var cHistKey = "";    // qual aba histórica está sendo exibida

// ============================================================
// PARSE CSV
// ============================================================
function parseCSV(text) {
  var rows = text.split('\n');
  var result = [];
  for (var i = 0; i < rows.length; i++) {
    var line = rows[i];
    var cells = [], inQ = false, cell = '';
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ''; }
      else { cell += ch; }
    }
    cells.push(cell.trim());
    var hasContent = cells.some(function(c){ return c !== ''; });
    if (hasContent) result.push(cells);
  }
  return result;
}

function cleanName(n) { return (n || '').replace(/\u{1F451}/gu, '').trim(); }
function countCrowns(n) { var m = (n||'').match(/\u{1F451}/gu); return m ? m.length : 0; }

function buildData(rows) {
  var bm = {}, bf = {}, nm = {}, nf = {};
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    if (r.length < 4) continue;
    var cat  = (r[0] || '').trim().toLowerCase();
    var cnum = parseInt(r[1]);
    var slot = parseInt(r[2]);
    var nR4  = (r[3] || '').trim();
    var rod4 = parseFloat(r[4]) || 0;
    var soma = parseFloat(r[5]) || 0;
    var nR5  = (r[6] || '').trim();
    var rod5 = parseFloat(r[7]) || 0;
    if (!cat || isNaN(cnum) || isNaN(slot)) continue;
    var bR4 = (cat === 'fem') ? bf : bm;
    if (!bR4[cnum]) bR4[cnum] = [];
    bR4[cnum].push({slot:slot, name:cleanName(nR4), crowns:countCrowns(nR4), jogo4:rod4, soma:soma});
    var bR5 = (cat === 'fem') ? nf : nm;
    if (!bR5[cnum]) bR5[cnum] = [];
    bR5[cnum].push({slot:slot, name:cleanName(nR5), crowns:countCrowns(nR5), jogo5:rod5, soma:soma});
  }
  function toArr(bucket, isFem) {
    var lbl = isFem ? 'Fem.' : 'Masc.';
    return Object.keys(bucket).sort(function(a,b){ return +a - +b; }).map(function(k) {
      return { confronto: 'Confronto ' + k + ' ' + lbl, confrontoNum: +k,
               players: bucket[k].sort(function(a,b){ return a.slot - b.slot; }) };
    });
  }
  return { masc: toArr(bm,false), fem: toArr(bf,true),
           next_masc: toArr(nm,false), next_fem: toArr(nf,true) };
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function crown(){ return '<span style="font-size:.75rem">&#128081;</span>'; }

// ============================================================
// RENDER RANKING ATUAL (rodada 4)
// ============================================================
function renderR4(groups, cat, filter) {
  var panel = document.getElementById('panel-' + cat);
  var isFem = (cat === 'fem');
  var q = (filter || '').toLowerCase();
  var html = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var ok = false;
    if (q) { for (var j = 0; j < g.players.length; j++) { if (g.players[j].name.toLowerCase().indexOf(q) >= 0) { ok = true; break; } } }
    else ok = true;
    if (!ok) continue;
    var agKey = (isFem ? 'fem' : 'masc') + '_' + g.confrontoNum;
    var ag = AGENDA[agKey] || null;
    var isWOAtual = ag && ag.wo === true;
    var hasResult = g.players.some(function(p){ return p.jogo4 > 0; });
    var agInfo = '';
    if (ag && (ag.dia || ag.hora || ag.quadra)) {
      agInfo = (ag.dia||'') + (ag.hora ? ' · '+ag.hora : '') + (ag.quadra ? ' · Quadra '+ag.quadra : '');
    }
    var dotClass = hasResult ? 'verde' : (agInfo ? 'amarelo' : 'cinza');
    var statusLabel = dotClass === 'verde' ? 'CONCLUIDO' : (dotClass === 'amarelo' ? 'AGENDADO' : 'NAO AGENDADO');
    html += '<div class="confronto-block' + (isWOAtual ? ' wo-atual' : '') + '">';
    html += '<div class="confronto-header">';
    html += '<span class="confronto-title ' + cat + '">' + esc(g.confronto) + '</span>';
    if (isWOAtual) {
      html += '<span class="wo-badge">WO</span>';
    } else if (agInfo) {
      html += '<span class="agenda-info">' + agInfo + '</span>';
    }
    html += '<span class="agenda-status"><span class="agenda-dot '+dotClass+'"></span><span class="agenda-label '+dotClass+'">'+statusLabel+'</span></span>';
    html += '</div>';
    html += '<div class="col-headers"><div class="col-h"></div><div class="col-h">Jogador</div><div class="col-h right">Rodada</div><div class="col-h right">Soma</div></div>';
    var ranked = g.players.slice().sort(function(a,b){ return b.jogo4!==a.jogo4 ? b.jogo4-a.jogo4 : b.soma-a.soma; });
    var rankMap = {};
    for (var r = 0; r < ranked.length; r++) rankMap[ranked[r].slot] = r;
    for (var j = 0; j < g.players.length; j++) {
      var p = g.players[j];
      var match = q && (p.name.toLowerCase().indexOf(q) >= 0);
      var empty = !p.name || p.name.toUpperCase() === 'ABERTO';
      var crowns = ''; for (var c = 0; c < p.crowns; c++) crowns += crown();
      var displayName = empty ? 'Vaga aberta' : esc(p.name) + crowns;
      var j4 = p.jogo4 > 0 ? '<div class="jogo-cell has-value">'+p.jogo4+'</div>' : '<div class="jogo-cell">-</div>';
      var sm = p.soma > 0 ? '<div class="soma-cell'+(isFem?' fem':'')+'">'+p.soma+'</div>' : '<div class="soma-cell empty">-</div>';
      var rowCls = 'player-row' + (match ? ' hl'+(isFem?' fem-hl':'') : '');
      var nameCls = 'player-name' + (empty ? ' empty' : '');
      var slotCls = 'slot-num';
      if (p.jogo4 > 0) {
        var rank = rankMap[p.slot]; var nG = groups.length; var movement;
        if (i===0)       movement = (rank<=1) ? 'stay' : 'down';
        else if (i===1)  movement = (rank<=1) ? 'up' : (rank===2 ? 'stay' : 'down');
        else if (i===nG-1) movement = (rank<=1) ? 'up' : 'stay';
        else if (i===nG-2) movement = (rank===0) ? 'up' : (rank===1 ? 'stay' : 'down');
        else             movement = (rank===0) ? 'up' : (rank<=2 ? 'stay' : 'down');
        if (movement==='up') slotCls='slot-num slot-1st';
        else if (movement==='stay') slotCls='slot-num slot-2nd';
        else slotCls='slot-num slot-4th';
      }
      html += '<div class="'+rowCls+'">';
      html += '<div class="'+slotCls+'">'+(((g.confrontoNum-1)*4)+p.slot)+'</div>';
      html += '<div class="'+nameCls+'">'+displayName+'</div>'+j4+sm;
      html += '</div>';
    }
    html += '</div>';
  }
  panel.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:2rem">Nenhum resultado.</p>';
}

// ============================================================
// RENDER PRÓXIMA RODADA
// ============================================================
function renderR5(groups, panelId) {
  var panel = document.getElementById(panelId);
  var isFem = panelId.indexOf('fem') >= 0;
  var titleCls = isFem ? 'next-fem' : 'next-masc';
  var html = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    html += '<div class="confronto-block next-block">';
    html += '<div class="confronto-header"><span class="confronto-title '+titleCls+'">'+esc(g.confronto)+'</span></div>';
    html += '<div class="col-headers"><div class="col-h"></div><div class="col-h">Jogador</div><div class="col-h right">'+(window._cfgProxima||'Proxima')+'</div><div class="col-h right">Soma</div></div>';
    for (var j = 0; j < g.players.length; j++) {
      var p = g.players[j];
      var empty = !p.name;
      var crowns = ''; for (var c = 0; c < (p.crowns||0); c++) crowns += crown();
      var displayName = empty ? 'A definir...' : esc(p.name) + crowns;
      var j5 = p.jogo5 > 0 ? '<div class="jogo-cell has-value">'+p.jogo5+'</div>' : '<div class="jogo-cell">-</div>';
      var somaVal = (p.soma>0&&!empty) ? '<div class="soma-cell'+(isFem?' fem':'')+'">'+p.soma+'</div>' : '<div class="soma-cell empty">-</div>';
      var nameCls = 'player-name'+(empty?' pending':'');
      html += '<div class="player-row"><div class="slot-num next-slot">'+((g.confrontoNum-1)*4+p.slot)+'</div>';
      html += '<div class="'+nameCls+'">'+displayName+'</div>'+j5+somaVal+'</div>';
    }
    html += '</div>';
  }
  panel.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:2rem">Formacao ainda nao definida.</p>';
}

// ============================================================
// RENDER HISTÓRICO
// ============================================================
function renderHist(histKey, cat) {
  var panel = document.getElementById('panel-hist-' + cat);
  var isFem = (cat === 'fem');
  var titleCls = isFem ? 'hist-fem' : 'hist-masc';
  var histData = HISTORICO[histKey];
  if (!histData) { panel.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">Dados não encontrados.</p>'; return; }
  var groups = isFem ? histData.fem : histData.masc;
  if (!groups || groups.length === 0) { panel.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">Nenhum dado para esta categoria.</p>'; return; }

  var jogoLabel = histKey.replace('2026 ', '');

  var html = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var isWO = g.wo === true;
    var blockCls = 'confronto-block hist-block' + (isWO ? ' wo-block' : '');
    html += '<div class="' + blockCls + '">';

    // Header com data/hora/quadra e WO
    html += '<div class="confronto-header">';
    html += '<span class="confronto-title ' + titleCls + '">' + esc(g.confronto) + '</span>';
    if (isWO) {
      html += '<span class="wo-badge">WO</span>';
    } else if (g.dia || g.hora || g.quadra) {
      var agInfo = (g.dia||'') + (g.hora ? ' · '+g.hora : '') + (g.quadra ? ' · Quadra '+g.quadra : '');
      html += '<span class="hist-agenda-info">' + esc(agInfo) + '</span>';
    }
    html += '</div>';

    html += '<div class="col-headers"><div class="col-h"></div><div class="col-h">Jogador</div><div class="col-h right">'+esc(jogoLabel)+'</div><div class="col-h right">Soma</div></div>';

    var hasResult = g.players.some(function(p){ return p.jogo > 0; });
    var rankMap = {};
    if (hasResult && !isWO) {
      var ranked = g.players.slice().sort(function(a,b){ return b.jogo!==a.jogo ? b.jogo-a.jogo : b.soma-a.soma; });
      for (var r = 0; r < ranked.length; r++) rankMap[ranked[r].slot] = r;
    }

    for (var j = 0; j < g.players.length; j++) {
      var p = g.players[j];
      var empty = !p.nome;
      var displayName = empty ? 'Vaga aberta' : esc(p.nome);
      var jogoVal = p.jogo > 0 ? '<div class="jogo-cell hist-value">'+p.jogo+'</div>' : '<div class="jogo-cell">-</div>';
      var somaVal = p.soma > 0 ? '<div class="soma-cell'+(isFem?' fem':'')+'">'+p.soma+'</div>' : '<div class="soma-cell empty">-</div>';
      var nameCls = 'player-name' + (empty ? ' empty' : '');

      var slotCls = 'slot-num hist-slot';
      if (!isWO && hasResult && !empty) {
        var rank = rankMap[p.slot]; var nG = groups.length; var movement;
        if (i===0)         movement = (rank<=1) ? 'stay' : 'down';
        else if (i===1)    movement = (rank<=1) ? 'up' : (rank===2 ? 'stay' : 'down');
        else if (i===nG-1) movement = (rank<=1) ? 'up' : 'stay';
        else if (i===nG-2) movement = (rank===0) ? 'up' : (rank===1 ? 'stay' : 'down');
        else               movement = (rank===0) ? 'up' : (rank<=2 ? 'stay' : 'down');
        if (movement==='up')        slotCls = 'slot-num slot-1st';
        else if (movement==='stay') slotCls = 'slot-num slot-2nd';
        else                        slotCls = 'slot-num slot-4th';
      }

      html += '<div class="player-row"><div class="'+slotCls+'">'+(((g.numero-1)*4)+p.slot)+'</div>';
      html += '<div class="'+nameCls+'">'+displayName+'</div>'+jogoVal+somaVal+'</div>';
    }
    html += '</div>';
  }
  panel.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:2rem">Nenhum dado.</p>';
}

// ============================================================
// CALCULA PRÓXIMA RODADA (client-side)
// ============================================================
function computeNextRound(groups) {
  var n = groups.length;
  if (n === 0) return groups;
  // Mapa de WO por índice (usa AGENDA do confronto atual)
  var woMap = {};
  groups.forEach(function(g, idx) {
    var agMasc = AGENDA['masc_' + g.confrontoNum];
    var agFem  = AGENDA['fem_'  + g.confrontoNum];
    var ag = agMasc || agFem || null;
    if (ag && ag.wo === true) woMap[idx] = true;
  });
  function rankPlayers(players) {
    var hasJogo4 = players.some(function(p){ return p.jogo4 > 0; });
    if (!hasJogo4) return null;
    return players.slice().sort(function(a,b){ return b.jogo4!==a.jogo4 ? b.jogo4-a.jogo4 : b.soma-a.soma; });
  }
  var ranked = groups.map(function(g){ return rankPlayers(g.players); });
  var result = groups.map(function(g){ return [{slot:1,name:'',crowns:0,jogo5:0,soma:0},{slot:2,name:'',crowns:0,jogo5:0,soma:0},{slot:3,name:'',crowns:0,jogo5:0,soma:0},{slot:4,name:'',crowns:0,jogo5:0,soma:0}]; });
  function sortTwo(a,b){ if(!a||!b) return [a,b]; return (b.jogo4!==a.jogo4)?(b.jogo4>a.jogo4?[b,a]:[a,b]):(b.soma>a.soma?[b,a]:[a,b]); }
  function makeSlot(p){ if(!p) return {slot:0,name:'',crowns:0,jogo5:0,soma:0}; return {slot:0,name:p.name,crowns:p.crowns,jogo5:0,soma:p.soma}; }
  for (var i = 0; i < n; i++) {
    // WO: todos ficam no mesmo confronto (último) ou descem (meio/primeiro)
    if (woMap[i]) {
      var dest = (i === n - 1) ? i : i + 1;
      var jogWO = groups[i].players;
      for (var w = 0; w < jogWO.length; w++) {
        result[dest][w] = makeSlot(jogWO[w]);
        result[dest][w].slot = w + 1;
      }
      continue;
    }
    var r = ranked[i]; if (!r) continue;

    // Último efetivo = último confronto sem WO
    var lastEfetivo = n - 1;
    while (lastEfetivo > 0 && woMap[lastEfetivo]) lastEfetivo--;

    var isFirst=(i===0),isSecond=(i===1&&n>2),isLast=(i===lastEfetivo),isPenult=(i===lastEfetivo-1);

    if (isFirst){
      var top=sortTwo(r[0],r[1]); result[0][0]=makeSlot(top[0]);result[0][0].slot=1; result[0][1]=makeSlot(top[1]);result[0][1].slot=2;
      if(n>1){var down=sortTwo(r[2],r[3]);result[1][0]=makeSlot(down[0]);result[1][0].slot=1;result[1][1]=makeSlot(down[1]);result[1][1].slot=2;}
    } else if(isSecond){
      var up2=sortTwo(r[0],r[1]);result[0][2]=makeSlot(up2[0]);result[0][2].slot=3;result[0][3]=makeSlot(up2[1]);result[0][3].slot=4;
      result[1][2]=makeSlot(r[2]);result[1][2].slot=3;
      if(!woMap[i+1]){result[2][0]=makeSlot(r[3]);result[2][0].slot=1;}
    } else if(isLast){
      // Último efetivo: 1º e 2º sobem, 3º e 4º ficam
      var upL=sortTwo(r[0],r[1]);result[i-1][2]=makeSlot(upL[0]);result[i-1][2].slot=3;result[i-1][3]=makeSlot(upL[1]);result[i-1][3].slot=4;
      var stayL=sortTwo(r[2],r[3]);result[i][2]=makeSlot(stayL[0]);result[i][2].slot=3;result[i][3]=makeSlot(stayL[1]);result[i][3].slot=4;
    } else if(isPenult){
      result[i-1][3]=makeSlot(r[0]);result[i-1][3].slot=4;result[i][1]=makeSlot(r[1]);result[i][1].slot=2;
      var downP=sortTwo(r[2],r[3]);
      var nextIdx=i+1; while(nextIdx<n&&woMap[nextIdx]) nextIdx++;
      if(nextIdx<n){result[nextIdx][0]=makeSlot(downP[0]);result[nextIdx][0].slot=1;result[nextIdx][1]=makeSlot(downP[1]);result[nextIdx][1].slot=2;}
      else{result[i][2]=makeSlot(downP[0]);result[i][2].slot=3;result[i][3]=makeSlot(downP[1]);result[i][3].slot=4;}
    } else {
      result[i-1][3]=makeSlot(r[0]);result[i-1][3].slot=4;result[i][1]=makeSlot(r[1]);result[i][1].slot=2;
      result[i][2]=makeSlot(r[2]);result[i][2].slot=3;
      var nextIdx2=i+1; while(nextIdx2<n&&woMap[nextIdx2]) nextIdx2++;
      if(nextIdx2<n){result[nextIdx2][0]=makeSlot(r[3]);result[nextIdx2][0].slot=1;}
    }
  }
  return groups.map(function(g,i){
    return {confronto:g.confronto,confrontoNum:g.confrontoNum,players:result[i].slice().sort(function(a,b){return a.slot-b.slot;})};
  });
}

// ============================================================
// CONTROLE DE VIEWS E ABAS
// ============================================================
function switchView(v) {
  cView = v;
  document.getElementById('view-ranking').className = v!=='ranking' ? 'hidden' : '';
  document.getElementById('view-proxima').className = v!=='proxima' ? 'hidden' : '';
  document.getElementById('view-hist').className    = v!=='hist'    ? 'hidden' : '';
  document.getElementById('btn-ranking').className = 'nav-btn'+(v==='ranking'?' active-ranking':'');
  document.getElementById('btn-proxima').className = 'nav-btn'+(v==='proxima'?' active-proxima':'');
  // Atualiza estilo dos botões históricos
  var histBtns = document.querySelectorAll('.hist-btn');
  for (var i = 0; i < histBtns.length; i++) {
    histBtns[i].className = 'nav-btn hist-btn' + (v==='hist' && histBtns[i].dataset.key===cHistKey ? ' active-hist' : '');
  }
}

function switchTab(t) {
  cTab = t;
  document.getElementById('panel-masc').className = t!=='masc' ? 'hidden' : '';
  document.getElementById('panel-fem').className  = t!=='fem'  ? 'hidden' : '';
  document.getElementById('tab-masc').className   = 'tab masc'+(t==='masc'?' active':'');
  document.getElementById('tab-fem').className    = 'tab fem' +(t==='fem' ?' active':'');
}

function switchNextTab(t) {
  cNTab = t;
  document.getElementById('panel-next-masc').className = t!=='masc' ? 'hidden' : '';
  document.getElementById('panel-next-fem').className  = t!=='fem'  ? 'hidden' : '';
  document.getElementById('tab-next-masc').className   = 'tab next'+(t==='masc'?' active':'');
  document.getElementById('tab-next-fem').className    = 'tab next'+(t==='fem' ?' active':'');
}

function switchHistTab(t) {
  cHTab = t;
  document.getElementById('panel-hist-masc').className = t!=='masc' ? 'hidden' : '';
  document.getElementById('panel-hist-fem').className  = t!=='fem'  ? 'hidden' : '';
  document.getElementById('tab-hist-masc').className   = 'tab hist'+(t==='masc'?' active':'');
  document.getElementById('tab-hist-fem').className    = 'tab hist'+(t==='fem' ?' active':'');
}

function openHist(key) {
  cHistKey = key;
  // Atualiza banner
  document.getElementById('histBannerTitle').textContent = '📋 ' + key;
  // Renderiza
  renderHist(key, 'masc');
  renderHist(key, 'fem');
  // Volta para aba masc
  switchHistTab('masc');
  switchView('hist');
}

function filterSearch() {
  var q = document.getElementById('searchInput').value;
  renderR4(DATA.masc, 'masc', q);
  renderR4(DATA.fem, 'fem', q);
  if (q) {
    document.getElementById('panel-masc').className = '';
    document.getElementById('panel-fem').className = '';
  } else { switchTab(cTab); }
}

// ============================================================
// APLICA CONFIGURAÇÕES (rodada/prazo/proxima)
// ============================================================
function toOrdinal(n) {
  // "Rodada 5" ou "5" → "5ª Rodada"
  var num = parseInt(String(n).replace(/\D/g,''));
  if (!num) return String(n);
  return num + 'ª Rodada';
}

function applyConfig(cfg) {
  if (!cfg) return;
  window._cfgProxima = cfg.proxima || 'Proxima';
  window._cfgRodada  = cfg.rodada  || '';
  window._cfgProximaFull = cfg.proxima || '';
  var rodada = (cfg.rodada || '').replace(/\s*[-–]\s*Atual/i,'').trim();
  if (rodada && cfg.prazo) {
    document.getElementById('rodadaTitle').textContent = toOrdinal(rodada) + ' · Prazo até ' + cfg.prazo;
  }
  // Botão atual: "5ª Rodada - Atual" (destaque)
  document.getElementById('btn-ranking').textContent = toOrdinal(rodada) + ' - Atual';
  // Botão próxima: "6ª Rodada - Próxima Formação"
  var proxNum = toOrdinal(cfg.proxima || '');
  document.getElementById('btn-proxima').textContent = proxNum + ' - Próxima Formação';
  // Banner próxima
  if (cfg.proxima) {
    document.getElementById('proximaBannerTitle').textContent = '⚡ ' + proxNum + ' - 2026 - Formação';
  }
}

// ============================================================
// GERA BOTÕES DE HISTÓRICO dinamicamente
// ============================================================
function buildHistButtons(historico) {
  var keys = Object.keys(historico);
  var nav = document.getElementById('navButtons');
  // Remove botões históricos antigos
  var oldBtns = nav.querySelectorAll('.hist-btn');
  for (var i = 0; i < oldBtns.length; i++) oldBtns[i].parentNode.removeChild(oldBtns[i]);
  // Ordena crescente: Jogo 2, Jogo 3, Jogo 4... (mais antigo primeiro = mais à esquerda)
  var sorted = keys.slice().sort(function(a,b){
    var na = parseInt(a.replace(/\D/g,'') || 0);
    var nb = parseInt(b.replace(/\D/g,'') || 0);
    return na - nb;
  });
  var btnRanking = document.getElementById('btn-ranking');
  for (var i = 0; i < sorted.length; i++) {
    var key = sorted[i];
    // Extrai número: "2026 Jogo 4" → 4
    var numMatch = key.match(/\d+$/);
    var num = numMatch ? numMatch[0] : '';
    var label = num + 'ª Rodada - Concluída';
    var btn = document.createElement('button');
    btn.className = 'nav-btn hist-btn';
    btn.textContent = label;
    btn.dataset.key = key;
    btn.onclick = (function(k){ return function(){ openHist(k); }; })(key);
    // Insere ANTES do btn-ranking (botão atual)
    nav.insertBefore(btn, btnRanking);
  }
}

// ============================================================
// PROCESSA PAYLOAD DO APPS SCRIPT
// ============================================================
function processData(payload) {
  try {
    var csvText, cfg;
    if (typeof payload === 'object' && payload !== null && payload.csv) {
      csvText = payload.csv;
      cfg = payload.cfg || null;
      AGENDA = payload.agenda || {};
      HISTORICO = payload.historico || {};
      if (cfg && cfg.rodada) cfg.rodada = cfg.rodada.replace(/\s*[-–]\s*Atual/i,'').trim();
      if (cfg && cfg.prazo && cfg.prazo.length > 20) {
        try { var d=new Date(cfg.prazo); cfg.prazo=('0'+d.getDate()).slice(-2)+'/'+ ('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); } catch(e){}
      }
    } else if (typeof payload === 'string') {
      try {
        var obj = JSON.parse(payload);
        if (obj && obj.csv) { csvText=obj.csv; cfg=obj.cfg||null; AGENDA=obj.agenda||{}; HISTORICO=obj.historico||{}; }
        else { csvText=payload; cfg=null; }
      } catch(e) { csvText=payload; cfg=null; }
    } else { throw new Error('Formato invalido'); }

    csvText = String(csvText).replace(/\\n/g,'\n').replace(/\\r/g,'');
    var rows = parseCSV(csvText);
    var data = buildData(rows);
    if (data.masc.length === 0 && data.fem.length === 0) throw new Error('Sem dados');
    DATA = data;

    applyConfig(cfg);
    buildHistButtons(HISTORICO);

    renderR4(DATA.masc, 'masc', '');
    renderR4(DATA.fem,  'fem',  '');

    var mascHasResults = DATA.masc.some(function(g){ return g.players.some(function(p){ return p.jogo4>0; }); });
    var femHasResults  = DATA.fem.some(function(g){ return g.players.some(function(p){ return p.jogo4>0; }); });
    var nextMasc = mascHasResults ? computeNextRound(DATA.masc) : DATA.next_masc;
    var nextFem  = femHasResults  ? computeNextRound(DATA.fem)  : DATA.next_fem;
    renderR5(nextMasc, 'panel-next-masc');
    renderR5(nextFem,  'panel-next-fem');

    document.getElementById('loading-ranking').className = 'loading hidden';
    document.getElementById('panel-masc').className = '';
    document.getElementById('syncDot').className = 'sync-dot live';
    document.getElementById('syncStatus').textContent = 'Atualizado';
  } catch(err) {
    document.getElementById('syncDot').className = 'sync-dot error';
    document.getElementById('syncStatus').textContent = 'Erro: ' + err.message;
    document.getElementById('loading-ranking').innerHTML = '<p style="color:#ff6b6b;padding:2rem;text-align:center">Erro ao carregar dados.</p>';
  }
}

// ============================================================
// FETCH DOS DADOS (JSONP)
// ============================================================
function fetchData() {
  var dot = document.getElementById('syncDot');
  var status = document.getElementById('syncStatus');
  dot.className = 'sync-dot';
  status.textContent = 'Sincronizando...';
  var old = document.getElementById('jsonp-script');
  if (old) old.parentNode.removeChild(old);
  window._jsonpTimeout = setTimeout(function() {
    dot.className = 'sync-dot error';
    status.textContent = 'Erro de sincronizacao';
    document.getElementById('loading-ranking').innerHTML = '<p style="color:#ff6b6b;padding:2rem;text-align:center">Erro ao carregar. Tente recarregar.</p>';
  }, 15000);
  window._cb = function(payload) {
    clearTimeout(window._jsonpTimeout);
    processData(payload);
  };
  var script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = APPS_URL + '?callback=_cb&t=' + Date.now();
  document.head.appendChild(script);
}

fetchData();
setInterval(fetchData, 5 * 60 * 1000);
</script>
