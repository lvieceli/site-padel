<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Joaçaba</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .circle1 {
      position: fixed;
      top: -80px; left: -80px;
      width: 350px; height: 350px;
      background: #c8f000;
      border-radius: 50%;
      opacity: 0.07;
    }
    .circle2 {
      position: fixed;
      bottom: -100px; right: -100px;
      width: 420px; height: 420px;
      background: #c8f000;
      border-radius: 50%;
      opacity: 0.04;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      z-index: 1;
    }
    .logo {
      max-width: 340px;
      width: 100%;
      margin-bottom: 2.5rem;
    }
    .badge {
      background: #c8f000;
      color: #0a0a0a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 20px;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #888;
      font-size: 15px;
      line-height: 1.6;
    }
    .divider {
      width: 48px;
      height: 3px;
      background: #c8f000;
      border-radius: 2px;
      margin: 1.75rem 0;
    }
    .ranking-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #333;
      color: #aaa;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 999px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .ranking-link:hover {
      border-color: #c8f000;
      color: #c8f000;
    }
  </style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="container">
    <img class="logo" src="logopj.png" alt="Padel Joaçaba">
    <div class="badge">Em breve</div>
    <h1>Algo incrível está chegando</h1>
    <p>O site oficial do Padel Joaçaba está em construção.<br>Aguarde novidades!</p>
    <div class="divider"></div>
    <a class="ranking-link" href="/ranking">
      🏆 Ver ranking atual
    </a>
  </div>
</body>
</html>
